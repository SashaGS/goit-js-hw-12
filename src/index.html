<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <form class="form">
        <label>
          <input class="input-search-js"
            type="text"
            name="search-text"
            placeholder="Search images..."
            required
          />
        </label>
        <button class="btn-js" type="submit">Search</button>
      </form>
      
      <div class="container">
        <div class="loader hidden"></div>
        <ul class="gallery"></ul> 
        <button class="btn-showmore-js hidden-shmore" type="button">Show More</button>      
      </div>
    </main>
    <!-- <load src="./partials/footer.html" /> -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
